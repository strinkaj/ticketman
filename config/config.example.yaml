# Copy to config/config.yaml and fill in. config.yaml is gitignored.

ticketmaster:
  # Free consumer key from https://developer.ticketmaster.com.
  # Prefer the TM_API_KEY environment variable over writing it here.
  api_key: ""
  country_code: "US"

notifications:
  desktop: true

# Sellout-likelihood weights. Each factor is normalized to 0..1, multiplied by
# its weight, and the weighted average is rescaled to 0..100. Weights are
# normalized by their own sum, so they do not have to add up to 1. Tune to your
# own experience of what sells out.
strategy:
  presale_density: 0.25    # more presale windows means higher expected demand
  verified_fan: 0.25       # Verified Fan or Platinum presale present
  price_ceiling: 0.15      # high max price hints at dynamic/platinum pricing
  market_size: 0.15        # bigger metro clears faster
  venue_scarcity: 0.12     # smaller room sells out faster for the same demand
  genre: 0.08              # genre base rate

# The buying group lives in config/roster.yaml, managed with:
#   ticketman roster add "Name" --email you@example.com --access amex,verified-fan
